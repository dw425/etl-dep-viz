command:
  - "bash"
  - "databricks-app/build.sh"

env:
  # Database URL — use valueFrom with a Databricks secret scope for production:
  #   valueFrom:
  #     secretScope: etl-dep-viz
  #     secretKey: database-url
  - name: EDV_DATABASE_URL
    valueFrom:
      secretScope: etl-dep-viz
      secretKey: database-url
  - name: EDV_DATABRICKS_APP
    value: "true"
  - name: EDV_CORS_ORIGINS
    value: '["*"]'
  - name: DATABRICKS_HOST
    value: "https://adb-1866518241053589.9.azuredatabricks.net"
  - name: EDV_DATABRICKS_LLM_MODEL
    value: "databricks-meta-llama-3-3-70b-instruct"
  - name: EDV_DATABRICKS_EMBEDDING_MODEL
    value: "databricks-bge-large-en"
